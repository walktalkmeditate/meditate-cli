<!doctype html>
<!--
  Source for the Open Graph / social share card. Render at 1200×630 and save to
  web/public/og.png:  serve this dir, open in a browser sized 1200×630, screenshot.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      body {
        position: relative;
        background:
          radial-gradient(130% 100% at 50% 34%, #12171b 0%, #0a0c10 52%, #06070a 100%);
        font-family: "SF Mono", "JetBrains Mono", "Menlo", "DejaVu Sans Mono", monospace;
        color: #cfe3d4;
      }

      /* ── the orb ───────────────────────────────────────────────────────── */
      .orb-halo {
        position: absolute;
        left: 600px;
        top: 258px;
        width: 560px;
        height: 560px;
        transform: translate(-50%, -50%);
        background: radial-gradient(
          circle,
          rgba(124, 179, 137, 0.4) 0%,
          rgba(124, 179, 137, 0.13) 40%,
          rgba(124, 179, 137, 0) 68%
        );
      }
      .orb-ring {
        position: absolute;
        left: 600px;
        top: 258px;
        width: 384px;
        height: 384px;
        transform: translate(-50%, -50%);
        border: 1.5px solid rgba(140, 196, 152, 0.16);
        border-radius: 50%;
      }
      .orb-core {
        position: absolute;
        left: 600px;
        top: 258px;
        width: 248px;
        height: 248px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(circle at 50% 43%, #9bc7a2 0%, #659d6e 47%, #34563d 100%);
        box-shadow: 0 0 70px rgba(110, 168, 119, 0.2);
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(216, 224, 214, 0.55);
        filter: blur(0.4px);
      }

      /* ── text ──────────────────────────────────────────────────────────── */
      .wordmark {
        position: absolute;
        top: 432px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 66px;
        font-weight: 600;
        letter-spacing: 3px;
        color: #d4e6d8;
      }
      .wordmark .block {
        color: #84b890;
      }
      .tagline {
        position: absolute;
        top: 516px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 25px;
        letter-spacing: 1.5px;
        color: #6f8274;
      }
      .url {
        position: absolute;
        bottom: 42px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 22px;
        letter-spacing: 1px;
        color: #4f5d54;
      }
      .url .prompt {
        color: #84b890;
      }
      .url .host {
        color: #8aa092;
      }
    </style>
  </head>
  <body>
    <div class="orb-halo"></div>
    <div class="orb-ring"></div>
    <div class="orb-core"></div>

    <div class="particle" style="left: 300px; top: 150px; width: 5px; height: 5px; opacity: 0.5"></div>
    <div class="particle" style="left: 880px; top: 120px; width: 4px; height: 4px; opacity: 0.4"></div>
    <div class="particle" style="left: 760px; top: 90px; width: 3px; height: 3px; opacity: 0.35"></div>
    <div class="particle" style="left: 420px; top: 320px; width: 4px; height: 4px; opacity: 0.3"></div>
    <div class="particle" style="left: 820px; top: 350px; width: 5px; height: 5px; opacity: 0.4"></div>
    <div class="particle" style="left: 920px; top: 250px; width: 3px; height: 3px; opacity: 0.3"></div>
    <div class="particle" style="left: 250px; top: 280px; width: 4px; height: 4px; opacity: 0.35"></div>

    <div class="wordmark">meditate</div>
    <div class="tagline">a breath in your terminal</div>
    <div class="url"><span class="prompt">❯</span> <span class="host">cli.pilgrimapp.org</span></div>
  </body>
</html>
