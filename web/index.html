<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>meditate</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta
      name="description"
      content="A terminal breathing companion. Free, no account — nothing leaves your browser."
    />

    <!-- Open Graph / social share card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="meditate" />
    <meta property="og:url" content="https://cli.pilgrimapp.org/" />
    <meta property="og:title" content="meditate — a breath in your terminal" />
    <meta
      property="og:description"
      content="Paced breathing with a moss-colored orb, right in your terminal. Free, no account — nothing leaves your browser."
    />
    <meta property="og:image" content="https://cli.pilgrimapp.org/og.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta
      property="og:image:alt"
      content="A glowing moss orb on a dark terminal — meditate, cli.pilgrimapp.org"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="meditate — a breath in your terminal" />
    <meta
      name="twitter:description"
      content="Paced breathing with a moss-colored orb, right in your terminal. Free, no account."
    />
    <meta name="twitter:image" content="https://cli.pilgrimapp.org/og.png" />

    <!-- Critical styles inline so the calm placeholder paints with zero JS,
         before the bundle or any font loads. No blank white flash. -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0c10;
        overflow: hidden;
        font-family: "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
        color: #6f8274;
      }
      #screen {
        position: absolute;
        inset: 0;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      #loading.gone {
        opacity: 0;
      }
      #loading pre {
        margin: 0;
        font-size: 1.4rem;
        line-height: 1.05;
        opacity: 0.45;
      }
      #loading span {
        font-size: 0.78rem;
        letter-spacing: 0.28em;
        opacity: 0.55;
        text-transform: lowercase;
      }
    </style>
  </head>
  <body>
    <div id="screen"></div>
    <div id="loading" aria-hidden="true">
      <pre> ▄███▄
███████
 ▀███▀ </pre>
      <span>breathing in…</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
