name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)publish the Homebrew formula for"
        required: true

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          # Cross-compiled on the arm64 runner — GitHub's Intel macOS runners
          # are scarce and being retired.
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux audio deps (cpal/ALSA)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo build --release --locked --features audio,download --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          staging="meditate-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/meditate" "$staging/"
          cp LICENSE README.md "$staging/"
          tar -czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "meditate-${{ matrix.target }}"
          New-Item -ItemType Directory $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/meditate.exe" $staging
          Copy-Item LICENSE, README.md $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$staging.zip").Hash.ToLower()
          "$hash  $staging.zip" | Out-File "$staging.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: meditate-${{ matrix.target }}.*

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Assemble checksums.txt
        run: find dist -name '*.sha256' -exec cat {} + > dist/checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt

  # Update the Homebrew tap formula from the published release. Runs after a
  # successful release, or standalone via workflow_dispatch with a tag input.
  homebrew:
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success')
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: walktalkmeditate/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Render and push the formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y gettext-base
          export VERSION="${TAG#v}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern checksums.txt --output checksums.txt --clobber
          sha() { grep " $1\$" checksums.txt | awk '{print $1}'; }
          export SHA256_MAC_ARM="$(sha meditate-aarch64-apple-darwin.tar.gz)"
          export SHA256_MAC_X86="$(sha meditate-x86_64-apple-darwin.tar.gz)"
          export SHA256_LINUX_X86="$(sha meditate-x86_64-unknown-linux-gnu.tar.gz)"
          test -n "$SHA256_MAC_ARM" && test -n "$SHA256_MAC_X86" && test -n "$SHA256_LINUX_X86"
          envsubst '${VERSION} ${TAG} ${SHA256_MAC_ARM} ${SHA256_MAC_X86} ${SHA256_LINUX_X86}' \
            < .github/meditate.rb.tpl > tap/Formula/meditate.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/meditate.rb
          git commit -m "meditate $VERSION" || { echo "formula already current"; exit 0; }
          git push

  # Follow-up: add an aarch64-unknown-linux-gnu target via `cross`.
