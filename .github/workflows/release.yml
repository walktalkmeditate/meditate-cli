name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --features audio,download --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          staging="meditate-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/meditate" "$staging/"
          cp LICENSE README.md "$staging/"
          tar -czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "meditate-${{ matrix.target }}"
          New-Item -ItemType Directory $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/meditate.exe" $staging
          Copy-Item LICENSE, README.md $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$staging.zip").Hash.ToLower()
          "$hash  $staging.zip" | Out-File "$staging.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: meditate-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Assemble checksums.txt
        run: cat dist/*.sha256 > dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  # Follow-up: publish a Homebrew formula to momentmaker/homebrew-tap (cargo-dist
  # can generate this) and add an aarch64-unknown-linux-gnu target via `cross`.
