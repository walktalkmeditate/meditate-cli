name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint/format/test gate, pinned to the declared MSRV so `clippy -D warnings`
  # is deterministic (a floating `stable` toolchain breaks the gate whenever a
  # new clippy lint lands).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --locked

  # Catch ecosystem/toolchain drift on current stable. Tests only — no
  # `-D warnings`, so new advisory lints never fail the build.
  stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked
