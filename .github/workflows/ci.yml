name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint/format/test gate, pinned to the declared MSRV so `clippy -D warnings`
  # is deterministic (a floating `stable` toolchain breaks the gate whenever a
  # new clippy lint lands).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked

  # Gate the wasm build of the pure core (and, once it exists, the wasm façade)
  # so a stray std::env / clock / I/O in meditate-core fails on the PR rather
  # than at deploy time. Build-only: there is no headless wasm test runner here.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: wasm32-unknown-unknown
      - run: cargo build --locked -p meditate-core --target wasm32-unknown-unknown

  # Catch ecosystem/toolchain drift on current stable. Tests only — no
  # `-D warnings`, so new advisory lints never fail the build.
  stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked
