name: pages

# Build the web terminal and deploy it to GitHub Pages. The custom domain
# (cli.pilgrimapp.org) is configured in the repo's Pages Settings, NOT a
# committed CNAME — Actions deploys ignore a committed CNAME. Going live also
# needs DNS (CNAME cli -> <org>.github.io) and R2 CORS for the audio, both
# user-owned ops documented in the plan.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "crates/meditate-wasm/**"
      - "crates/meditate-core/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          targets: wasm32-unknown-unknown
      # Prebuilt wasm-bindgen CLI (no compile); version pinned to match the
      # wasm-bindgen library in crates/meditate-wasm/Cargo.toml.
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y wasm-bindgen-cli@0.2.95
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
